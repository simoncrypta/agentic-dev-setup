onboarding = false

[theme]
name = "gruvbox"
auto_switch = true
light_name = "gruvbox-light"
dark_name = "gruvbox"

[terminal]
new_cwd = "follow"
default_shell = "bash"

[keys]
prefix = "ctrl+space"

previous_workspace = "alt+up"
next_workspace = "alt+down"
previous_tab = ["prefix+p", "alt+left"]
next_tab = ["prefix+n", "alt+right"]
workspace_picker = "prefix+w"
detach = "prefix+shift+q"

split_vertical = "prefix+h"
split_horizontal = "prefix+v"

focus_pane_left = "ctrl+alt+h"
focus_pane_down = "ctrl+alt+j"
focus_pane_up = "ctrl+alt+k"
focus_pane_right = "ctrl+alt+l"

[[keys.command]]
key = "prefix+q"
type = "shell"
command = "herdr server reload-config"
description = "Reload config"

[[keys.command]]
key = "prefix+d"
type = "plugin_action"
command = "agentic-dev.dev-layout.apply"
description = "Apply dev layout"

[[keys.command]]
key = "prefix+1"
type = "plugin_action"
command = "agentic-dev.dev-layout.focus_agent"
description = "Focus agent pane"

[[keys.command]]
key = "prefix+2"
type = "plugin_action"
command = "agentic-dev.dev-layout.select_review"
description = "Review tab (tuicr)"

[[keys.command]]
key = "prefix+3"
type = "plugin_action"
command = "agentic-dev.dev-layout.select_explorer"
description = "Explorer tab (nvim)"

[[keys.command]]
key = "prefix+4"
type = "plugin_action"
command = "agentic-dev.dev-layout.select_terminal"
description = "Terminal tab"

[[keys.command]]
key = "alt+1"
type = "plugin_action"
command = "agentic-dev.dev-layout.select_review"
description = "Review tab (tuicr)"

[[keys.command]]
key = "alt+2"
type = "plugin_action"
command = "agentic-dev.dev-layout.select_explorer"
description = "Explorer tab (nvim)"

[[keys.command]]
key = "alt+3"
type = "plugin_action"
command = "agentic-dev.dev-layout.select_terminal"
description = "Terminal tab"
